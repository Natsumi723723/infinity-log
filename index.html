<style>
  /* ===== DARK THEME (default) ===== */
  :root {
    --pink: #E91E8C;
    --magenta: #FF00FF;
    --cyan: #00FFFF;
    --bg: #07000F;
    --surface: #110028;
    --border: rgba(233,30,140,0.3);
    --text: #f0e6ff;
    --text-sub: rgba(240,230,255,0.55);
    --text-muted: rgba(240,230,255,0.2);
    --memo-bg: linear-gradient(135deg, rgba(17,0,40,0.9) 0%, rgba(13,0,32,0.9) 100%);
    --memo-border: rgba(233,30,140,0.15);
    --header-bg: linear-gradient(180deg, #07000F 0%, rgba(7,0,15,0.95) 100%);
    --grid-color: rgba(233,30,140,0.04);
    --glow-orb: rgba(233,30,140,0.12);
    --theme-transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
  }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] {
    --bg: #FEF6FA;
    --surface: #FFFFFF;
    --border: rgba(233,30,140,0.2);
    --text: #1A0010;
    --text-sub: rgba(26,0,16,0.5);
    --text-muted: rgba(26,0,16,0.28);
    --memo-bg: linear-gradient(135deg, #FFFFFF 0%, #FFF8FC 100%);
    --memo-border: rgba(233,30,140,0.1);
    --header-bg: linear-gradient(180deg, rgba(254,246,250,0.98) 0%, rgba(254,246,250,0.95) 100%);
    --grid-color: transparent;
    --glow-orb: rgba(233,30,140,0.05);
    --cyan: #007A9A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: var(--theme-transition);
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(233,30,140,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(233,30,140,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.35s ease;
  }

  [data-theme="light"] .grid-overlay { opacity: 0; }

  .glow-orb {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(233,30,140,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.35s ease;
  }

  [data-theme="light"] .glow-orb { opacity: 0; }

  #root { position: relative; z-index: 1; }

  /* ===== THEME TOGGLE BUTTON ===== */
  .theme-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .theme-btn:hover {
    border-color: var(--pink);
    box-shadow: 0 0 10px rgba(233,30,140,0.35);
    transform: rotate(20deg) scale(1.1);
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transition: var(--theme-transition);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--magenta), var(--pink), transparent);
    box-shadow: 0 0 12px var(--pink), 0 0 24px rgba(233,30,140,0.5);
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--pink);
    text-shadow: 0 0 10px var(--magenta), 0 0 20px rgba(255,0,255,0.4);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  .sync-status {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .sync-dot.synced { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .sync-dot.syncing { background: var(--pink); box-shadow: 0 0 6px var(--pink); animation: pulse-dot 0.8s ease-in-out infinite; }
  .sync-dot.offline { background: var(--text-muted); }

  /* ====== AUTH SCREEN ====== */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 0 40px rgba(233,30,140,0.15), inset 0 0 40px rgba(233,30,140,0.03);
    text-align: center;
  }

  .auth-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.4em;
    color: var(--pink);
    text-shadow: 0 0 20px var(--magenta);
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-sub);
    margin-bottom: 32px;
    font-family: 'Orbitron', monospace;
  }

  .auth-email-input {
    width: 100%;
    background: rgba(233,30,140,0.04);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 0.05em;
    padding: 12px 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--pink);
  }
  .auth-email-input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 12px rgba(233,30,140,0.3);
  }
  .auth-email-input::placeholder { color: var(--text-muted); }

  .auth-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    border: none;
    border-radius: 2px;
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(233,30,140,0.4);
  }

  .auth-btn:hover {
    box-shadow: 0 0 30px rgba(233,30,140,0.7), 0 0 60px rgba(255,0,255,0.3);
    transform: translateY(-1px);
  }

  .auth-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .auth-msg {
    margin-top: 16px;
    font-size: 12px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    letter-spacing: 0.05em;
    min-height: 20px;
  }

  /* ====== INPUT AREA ====== */
  .input-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 24px;
  }

  .input-container {
    position: relative;
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 2px;
    padding: 14px 16px 10px;
    transition: var(--theme-transition), border-color 0.2s, box-shadow 0.2s;
  }

  .input-container.focused {
    border-color: rgba(233,30,140,0.4);
    box-shadow: 0 0 20px rgba(233,30,140,0.1);
  }

  .input-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .input-meta-date {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--pink);
    text-shadow: 0 0 8px rgba(233,30,140,0.5);
  }

  .log-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 60px;
    caret-color: var(--pink);
    transition: color 0.35s ease;
  }

  .log-input::placeholder { color: var(--text-muted); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .hint-text {
    font-family: 'Orbitron', monospace;
    font-size: 7px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }

  .saved-indicator {
    font-family: 'Orbitron', monospace;
    font-size: 7px;
    letter-spacing: 0.3em;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .saved-indicator.visible { opacity: 1; }

  /* ====== QUICK LOG ====== */
  .quick-log-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .quick-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--memo-border);
    background: var(--memo-bg);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .quick-btn:hover, .quick-btn:active {
    border-color: var(--pink);
    background: rgba(233,30,140,0.1);
    box-shadow: 0 0 10px rgba(233,30,140,0.2);
    transform: scale(1.12);
  }

  /* ====== TIMELINE ====== */
  .timeline {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 24px 80px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 8px;
  }

  .date-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-sub);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .date-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .date-badge {
    font-family: 'Orbitron', monospace;
    font-size: 7px;
    letter-spacing: 0.25em;
    color: var(--pink);
    text-shadow: 0 0 8px var(--pink);
    border: 1px solid rgba(233,30,140,0.3);
    padding: 2px 6px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  /* ====== TAG BADGE ====== */
  .tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 12px;
    background: rgba(233,30,140,0.12);
    border: 1px solid rgba(233,30,140,0.25);
    font-size: 13px;
    font-weight: 600;
    color: var(--pink);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  /* ====== MEMO CARD ====== */
  .memo-card-wrap {
    position: relative;
    margin-bottom: 6px;
    overflow: hidden;
    border-radius: 2px;
  }
  .memo-card-delete-bg {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 80px;
    background: #c0152a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .memo-card {
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 2px;
    padding: 12px 16px 10px;
    transition: var(--theme-transition), border-color 0.2s, box-shadow 0.2s, transform 0.15s ease;
    cursor: text;
    position: relative;
    z-index: 1;
    will-change: transform;
    width: 100%;
    box-sizing: border-box;
  }

  .memo-card:hover {
    border-color: rgba(233,30,140,0.25);
    box-shadow: 0 0 12px rgba(233,30,140,0.06);
  }

  /* ── Daily Summary ── */
  .summary-btn {
    background: transparent;
    border: 1px solid var(--pink);
    color: var(--pink);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .summary-btn:hover { background: rgba(233,30,140,0.1); }

  .summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .summary-sheet {
    background: var(--bg);
    border: 1px solid var(--memo-border);
    border-radius: 8px 8px 0 0;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 24px 40px;
  }
  .summary-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .summary-nav-btn {
    background: transparent;
    border: none;
    color: var(--pink);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 0;
    opacity: 1;
    transition: opacity 0.15s;
  }
  .summary-nav-btn:disabled {
    color: var(--text-muted);
    cursor: default;
  }
  .summary-date {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: center;
  }
  .summary-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .summary-tag-chip {
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
  }
  .summary-section-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .summary-lines {
    margin-bottom: 20px;
  }
  .summary-line {
    font-size: 14px;
    color: var(--text-main);
    line-height: 1.8;
    padding: 2px 0;
  }
  .summary-line::before { content: '・'; color: var(--pink); }
  .summary-char-msg {
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 4px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-main);
    white-space: pre-wrap;
  }
  .summary-loading {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 40px 0;
    letter-spacing: 0.08em;
  }
  .summary-close {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    border: 1px solid var(--memo-border);
    color: var(--text-muted);
    border-radius: 2px;
    padding: 8px 24px;
    font-size: 12px;
    cursor: pointer;

/* ── Helpers ── */
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${DAYS[d.getDay()]}`;
}
function formatTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function dateKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function nowFormatted() {
  const d = new Date();
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${DAYS[d.getDay()]}`;
}

/* ── MemoCard ── */
function MemoCard({ memo, isNew, onUpdate, onDelete, activePersona, apiKey, customIcons, onIconChange, onNeedApiKey }) {
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(memo.text);
  const [editTag, setEditTag] = useState(memo.tag);
  const [showTagPicker, setShowTagPicker] = useState(false);
  const [aiReply, setAiReply] = useState(null);
  const [replyLoading, setReplyLoading] = useState(false);
  const [swipeX, setSwipeX] = useState(0);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const taRef = useRef(null);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const isHorizSwipe = useRef(false);

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    isHorizSwipe.current = false;
  };

  const handleTouchMove = (e) => {
    if (editing) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (!isHorizSwipe.current && Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) {
      isHorizSwipe.current = true;
      e.preventDefault();
      setSwipeX(Math.max(dx, -90));
    }
  };

  const handleTouchEnd = () => {
    if (swipeX < -60) {
      setSwipeX(-80);
      setShowDeleteConfirm(true);
    } else {
      setSwipeX(0);
    }
  };

  const handleDeleteConfirm = async () => {
    setShowDeleteConfirm(false);
    setSwipeX(0);
    await onDelete(memo.id);
  };

  const handleDeleteCancel = () => {
    setShowDeleteConfirm(false);
    setSwipeX(0);
  };

  useEffect(() => {
    if (editing && taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = taRef.current.scrollHeight + 'px';
      taRef.current.focus();
      const len = taRef.current.value.length;
      taRef.current.setSelectionRange(len, len);
    }
  }, [editing]);

  const handleSave = async () => {
    await onUpdate(memo.id, editText.trim(), editTag);
    setEditing(false);
  };

  const handleCancel = () => {
    setEditText(memo.text);
    setEditTag(memo.tag);
    setShowTagPicker(false);
    setEditing(false);
  };

  const handleKeyDown = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSave(); }
    if (e.key === 'Escape') handleCancel();
  };

  const handleInput = (e) => {
    setEditText(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
  };

  const getReply = async (e) => {
    e.stopPropagation();
    if (aiReply) { setAiReply(null); return; }
    setReplyLoading(true);
    const char = CHARACTERS[activePersona];
    try {
      const res = await fetch(`${SB_URL}/functions/v1/ai-reply`, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'authorization': `Bearer ${SB_KEY}`,
        },
        body: JSON.stringify({ text: memo.text, system: char.system }),
      });
      const data = await res.json();
      setAiReply(data.content?.[0]?.text || 'うまく答えられなかった…ごめんね');
    } catch (err) {
      console.error('AI reply error:', err);
      setAiReply('エラー: ' + (err?.message || String(err)));
    }
    setReplyLoading(false);
  };

  return (
    <div className="memo-card-wrap">
      {swipeX < 0 && <div className="memo-card-delete-bg" style={{opacity: Math.min(1, Math.abs(swipeX)/60)}}>DELETE</div>}
      {showDeleteConfirm && <DeleteConfirm onCancel={handleDeleteCancel} onConfirm={handleDeleteConfirm} />}
    <div
      className={`memo-card ${isNew ? 'new-entry' : ''} ${editing ? 'editing' : ''}`}
      onClick={() => { if (!editing) setEditing(true); }}
      style={{ cursor: editing ? 'default' : 'text', transform: `translateX(${swipeX}px)`, transition: swipeX === 0 ? 'transform 0.2s ease' : 'none' }}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <div className="memo-time">{formatTime(memo.created_at)}</div>
      {!editing && memo.tag && <div className="tag-badge">{memo.tag}</div>}
      {editing ? (
        <>
          <div className="tag-edit-row" onClick={e => e.stopPropagation()}>
            {editTag ? (
              <span className="tag-badge" style={{cursor:'pointer'}} onClick={() => setShowTagPicker(v => !v)}>
                {editTag} ✎
              </span>
            ) : (
              <button
                className="tag-add-btn"
                onClick={() => setShowTagPicker(v => !v)}
              >＋ タグ</button>
            )}
          </div>
          {showTagPicker && (
            <div className="tag-edit-picker" onClick={e => e.stopPropagation()}>
              {editTag && (
                <button
                  className="quick-btn"
                  style={{width:'34px',height:'34px',fontSize:'13px',color:'var(--text-muted)'}}
                  onClick={() => { setEditTag(null); setShowTagPicker(false); }}
                  title="タグ削除"
                >×</button>
              )}
              {QUICK_TAGS.map(({emoji, label}) => {
                const val = emoji + ' ' + label;
                return (
                  <button
                    key={label}
                    className={`quick-btn${editTag === val ? ' tag-selected' : ''}`}
                    style={{width:'34px',height:'34px',fontSize:'17px'}}
                    onClick={() => { setEditTag(val); setShowTagPicker(false); }}
                  >{emoji}</button>
                );
              })}
            </div>
          )}
          <textarea
            ref={taRef}
            className="memo-edit-input"
            value={editText}
            onChange={handleInput}
            onKeyDown={handleKeyDown}
            onClick={e => e.stopPropagation()}
            placeholder="コメントを追加…"
          />
          <div className="memo-edit-footer" onClick={e => e.stopPropagation()}>
            <span className="edit-hint">⌘ + ENTER to save  •  ESC to cancel</span>
            <button className="edit-cancel-btn" onClick={handleCancel}>CANCEL</button>
            <button className="edit-save-btn" onClick={handleSave}>SAVE</button>
          </div>
        </>
      ) : (
        <>
          {memo.text
            ? <div className="memo-text">{memo.text}</div>
            : memo.tag && <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'4px'}}>タップしてコメントを追加…</div>
          }
          <div className="memo-card-footer" onClick={e => e.stopPropagation()}>
            <button
              className="reply-btn"
              onClick={getReply}
              disabled={replyLoading}
            >
              <span>💬</span>
              <span>{aiReply ? '×' : CHARACTERS[activePersona].name}</span>
            </button>
          </div>
          {(aiReply || replyLoading) && (
            <div onClick={e => e.stopPropagation()}>
              <AIBubble
                persona={activePersona}
                text={aiReply}
                loading={replyLoading}
                customIcon={customIcons[activePersona]}
                onIconChange={onIconChange}
              />
            </div>
          )}
        </>
      )}
    </div>
    </div>
  );
}

/* ── DailySummary ── */
function DailySummary({ dateStr, memos, activePersona, onClose, onPrev, onNext }) {
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    generate();
  }, [dateStr]);

  const generate = async () => {
    setLoading(true);
    setResult(null);

    const tagCounts = {};
    memos.forEach(m => {
      if (m.tag) tagCounts[m.tag] = (tagCounts[m.tag] || 0) + 1;
    });
    const tagSummary = Object.entries(tagCounts).map(([t, c]) => `${t} ×${c}`).join('、');
    const logs = memos.map(m => [m.tag, m.text].filter(Boolean).join(' ')).join('\n');

    if (DEMO_MODE) {
      setResult({ tagCounts, lines: ['今日もたくさん記録してくれたね！', 'アイデアや気づきがあふれてた1日。', '自分と向き合う時間、すてきだよ。'], message: 'えーやば今日もしっかり生きてる〜！すごいじゃん！バタン💤', char: CHARACTERS[activePersona] });
      setLoading(false);
      return;
    }

    const char = CHARACTERS[activePersona];
    const system = `あなたは「${char.name}」というキャラクターです。${char.system}
今日のログをもとに、以下のJSON形式のみで返してください（説明文・マークダウン不要）:
{"lines":["具体的な出来事や言葉を使った振り返り1","振り返り2","振り返り3"],"message":"キャラとしての一言（1〜2文）"}
【重要】linesは必ずログに書かれた具体的な内容・言葉を引用・言及して書くこと。抽象的な表現NG。ですます調。メッセージはキャラの口調で。`;

    const userText = `タグ: ${tagSummary || 'なし'}\n\n今日のログ:\n${logs || '（記録なし）'}`;

    try {
      const res = await fetch(`${SB_URL}/functions/v1/ai-reply`, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'authorization': `Bearer ${SB_KEY}` },
        body: JSON.stringify({ text: userText, system }),
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const json = JSON.parse(text.match(/\{[\s\S]*\}/)?.[0] || '{}');
      setResult({ tagCounts, lines: json.lines || [], message: json.message || '', char });
    } catch (e) {
      setResult({ error: true });
    }
    setLoading(false);
  };

  return (
    <div className="summary-overlay" onClick={onClose}>
      <div className="summary-sheet" onClick={e => e.stopPropagation()}>
        <div className="summary-nav">
          <button className="summary-nav-btn" onClick={onPrev} disabled={!onPrev}>‹ 前の日</button>
          <div className="summary-date">✦ {dateStr}</div>
          <button className="summary-nav-btn" onClick={onNext} disabled={!onNext}>次の日 ›</button>
        </div>
        {loading ? (
          <div className="summary-loading">まとめ中…</div>
        ) : result?.error ? (
          <div className="summary-loading">生成できませんでした</div>
        ) : (
          <>
            <div className="summary-section-title">TODAY'S TAGS</div>
            <div className="summary-tags">
              {Object.entries(result.tagCounts).length > 0
                ? Object.entries(result.tagCounts).map(([tag, count]) => (
                    <span key={tag} className="summary-tag-chip">{tag} ×{count}</span>
                  ))
                : <span style={{fontSize:'13px',color:'var(--text-muted)'}}>タグなし</span>
              }
            </div>
            <div className="summary-section-title">TODAY IN 3 LINES</div>
            <div className="summary-lines">
              {result.lines.map((l, i) => <div key={i} className="summary-line">{l}</div>)}
            </div>
            <div className="summary-section-title">💬 {result.char.name} より</div>
            <div className="summary-char-msg">{result.message}</div>
            <button className="summary-btn" style={{margin:'16px auto 0',display:'block'}} onClick={generate}>再生成</button>
          </>
        )}
        <button className="summary-close" onClick={onClose}>閉じる</button>
      </div>
    </div>
  );
}

  /* Persona & AI state */
  const [activePersona, setActivePersona] = useState(() => localStorage.getItem('il-persona') || 'heartrun');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('il-api-key') || '');
  const [showSettings, setShowSettings] = useState(false);
  const [showPersonaPanel, setShowPersonaPanel] = useState(false);
  const [customIcons, setCustomIcons] = useState(() => {
    try { return JSON.parse(localStorage.getItem('il-icons') || '{}'); } catch { return {}; }
  });

  const headerRef = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('il-theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  const textareaRef = useRef(null);
  const debounceRef = useRef(null);
  const savedTimerRef = useRef(null);

  const selectPersona = (id) => {
    setActivePersona(id);
    localStorage.setItem('il-persona', id);
    setShowPersonaPanel(false);
  };

  const saveApiKey = (key) => {
    setApiKey(key);
    localStorage.setItem('il-api-key', key);
  };

  const handleIconChange = (personaId, dataUrl) => {
    const updated = { ...customIcons, [personaId]: dataUrl };
    setCustomIcons(updated);
    localStorage.setItem('il-icons', JSON.stringify(updated));
  };

  /* Close persona panel on outside click */
  useEffect(() => {
    if (!showPersonaPanel) return;
    const handler = (e) => {
      if (!headerRef.current?.contains(e.target)) setShowPersonaPanel(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [showPersonaPanel]);

  /* Auth */
  useEffect(() => {
    if (DEMO_MODE) {
      setSession({ user: { id: 'demo', email: 'demo@localhost' } });
      setAuthChecked(true);
      return;
    }
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthChecked(true);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setSession(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  /* Fetch memos */
  useEffect(() => {
    if (!session) return;
    if (DEMO_MODE) {
      setMemos(DEMO_MEMOS);
      setLoading(false);
      setSyncStatus('synced');
      return;
    }
    setLoading(true);
    sb.from('diary_logs')
      .select('*')
      .eq('user_id', session.user.id)
      .order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setMemos(data);
        setLoading(false);
        setSyncStatus('synced');
      });

    if (DEMO_MODE) return;
    const filter = `user_id=eq.${session.user.id}`;
    const channel = sb.channel('diary_realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.find(m => m.id === payload.new.id) ? prev : [payload.new, ...prev]);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.filter(m => m.id !== payload.old.id));
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [session]);

  /* Auto-resize textarea */
  useEffect(() => {
    const ta = textareaRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.max(60, ta.scrollHeight) + 'px';
  }, [draft]);

  const commitMemo = useCallback(async () => {
    const text = draft.trim();
    const tag = pendingTagRef.current;
    const isTodo = pendingTodoRef.current;
    if (!text && !tag) return;
    setDraft('');
    pendingTagRef.current = null;
    pendingTodoRef.current = false;
    setPendingTag(null);
    setSyncStatus('syncing');

    if (DEMO_MODE) {
      const fake = { id: String(Date.now()), text: text || null, tag: tag || null, created_at: new Date().toISOString(), user_id: 'demo' };
      setMemos(prev => [fake, ...prev]);
      setNewIds(prev => new Set([...prev, fake.id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(fake.id); return n; }), 500);
      setSyncStatus('synced');
      setSavedVisible(true);
      clearTimeout(savedTimerRef.current);
      savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
      return;
    }

    const { data, error } = await sb.from('diary_logs').insert({ text: text || null, tag: tag || null, user_id: session.user.id }).select().single();
    if (!error && data) {
      setMemos(prev => {
        if (prev.find(m => m.id === data.id)) return prev;
        return [data, ...prev];
      });
      setNewIds(prev => new Set([...prev, data.id]));
      setTimeout(() => {
        setNewIds(prev => { const n = new Set(prev); n.delete(data.id); return n; });
      }, 500);
    }
    setSyncStatus('synced');
    setSavedVisible(true);
    clearTimeout(savedTimerRef.current);
    savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
  }, [draft]);

  const handleKeyDown = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(debounceRef.current);
      commitMemo();
    }
  };

  const updateMemo = useCallback(async (id, text, tag) => {
    if (DEMO_MODE) {
      setMemos(prev => prev.map(m => m.id === id ? { ...m, text: text || null, tag: tag || null } : m));
      return;
    }
    setSyncStatus('syncing');
    const { data, error } = await sb.from('diary_logs').update({ text: text || null, tag: tag || null }).eq('id', id).select().single();
    if (!error && data) {
      setMemos(prev => prev.map(m => m.id === id ? data : m));
    }
    setSyncStatus('synced');
  }, []);

  const deleteMemo = useCallback(async (id) => {
    if (DEMO_MODE) {
      setMemos(prev => prev.filter(m => m.id !== id));
      return;
    }
    setSyncStatus('syncing');
    const { error } = await sb.from('diary_logs').delete().eq('id', id).eq('user_id', session.user.id);
    if (error) {
      console.error('delete error:', error);
      setSyncStatus('synced');
      return;
    }
    setMemos(prev => prev.filter(m => m.id !== id));
    setSyncStatus('synced');
  }, [session]);

  const handleChange = (e) => {
    setDraft(e.target.value);
    clearTimeout(debounceRef.current);
    if (e.target.value.trim()) {
      debounceRef.current = setTimeout(() => commitMemo(), 2000);
    }
  };

  /* Group by date */
  const groupMap = {};
  memos.forEach(m => {
    const key = dateKey(m.created_at);
    if (!groupMap[key]) groupMap[key] = { key, dateStr: formatDate(m.created_at), memos: [] };
    groupMap[key].memos.push(m);
  });
  const sortedGroups = Object.values(groupMap).sort((a,b) =>
    new Date(b.memos[0].created_at) - new Date(a.memos[0].created_at)
  );
  const todayKey = dateKey(Date.now());

  const syncLabel = { offline: 'OFFLINE', syncing: 'SYNC...', synced: 'SYNCED' };
  const syncColor = { offline: 'rgba(240,230,255,0.2)', syncing: 'var(--pink)', synced: 'var(--cyan)' };

  if (!authChecked) return null;
  if (!session) return <AuthScreen />;

  return (
    <>
      {summaryTarget && (() => {
        const idx = sortedGroups.findIndex(g => g.dateStr === summaryTarget.dateStr);
        const prevGroup = idx < sortedGroups.length - 1 ? sortedGroups[idx + 1] : null;
        const nextGroup = idx > 0 ? sortedGroups[idx - 1] : null;
        return (
          <DailySummary
            dateStr={summaryTarget.dateStr}
            memos={summaryTarget.memos}
            activePersona={activePersona}
            onClose={() => setSummaryTarget(null)}
            onPrev={prevGroup ? () => setSummaryTarget({ dateStr: prevGroup.dateStr, memos: prevGroup.memos }) : null}
            onNext={nextGroup ? () => setSummaryTarget({ dateStr: nextGroup.dateStr, memos: nextGroup.memos }) : null}
          />
        );
      })()}
      <header className="header" ref={headerRef} style={{ position: 'sticky', top: 0, zIndex: 100 }}>
        <div className="header-inner">
          <div className="logo">
            <span className="logo-dot" />
            <span className="logo-text">INFINITY LOG</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', position: 'relative' }}>
            <div className="sync-status" style={{ color: syncColor[syncStatus] }}>
              <span className={`sync-dot ${syncStatus}`} />
              {syncLabel[syncStatus]}
            </div>

            {/* Settings */}
            <button className="settings-btn" onClick={() => setShowSettings(true)} title="AI設定">
              ⚙
            </button>

            {/* Active persona button */}
            <button
              className="persona-active-btn"
              onClick={() => setShowPersonaPanel(v => !v)}
              title="キャラ切り替え"
            >
              {customIcons[activePersona]
                ? <img src={customIcons[activePersona]} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: '50%' }} />
                : <HeartSVG id={activePersona} size={32} />
              }
            </button>

            <button className="theme-btn" onClick={toggleTheme} title="テーマ切り替え">
              {theme === 'dark' ? '☀️' : '🌙'}
            </button>

            {/* Persona panel */}
            {showPersonaPanel && (
              <PersonaPanel
                active={activePersona}
                onSelect={selectPersona}
                customIcons={customIcons}
                onIconChange={handleIconChange}
              />
            )}
          </div>
        </div>

        <div className="input-wrapper">
          <div className={`input-container ${focused ? 'focused' : ''}`}>
            <div className="input-meta">
              <span className="input-meta-date">{nowFormatted()}</span>
              {pendingTag && (
                <span
                  className="tag-badge"
                  style={{marginBottom:0, cursor:'pointer'}}
                  onClick={() => { pendingTagRef.current = null; setPendingTag(null); }}
                  title="タップで削除"
                >{pendingTag} ×</span>
              )}
            </div>
            <textarea
              ref={textareaRef}
              className="log-input"
              placeholder="今、ここに何かを残す…"
              value={draft}
              onChange={handleChange}
              onKeyDown={handleKeyDown}
              onFocus={() => setFocused(true)}
              onBlur={() => {
                setFocused(false);
                if (draft.trim() || pendingTag) {
                  clearTimeout(debounceRef.current);
                  commitMemo();
                }
              }}
            />
            <div className="input-footer">
              <span className="hint-text">⌘ + ENTER to commit</span>
              <span className={`saved-indicator ${savedVisible ? 'visible' : ''}`}>
                ◆ SAVED
              </span>
            </div>
          </div>
        </div>

        <QuickLogBar onSelect={(tag, opts) => {
          pendingTagRef.current = tag;
          pendingTodoRef.current = !!(opts && opts.todo);
          setPendingTag(tag);
          clearTimeout(debounceRef.current);
          textareaRef.current?.focus();
          // コメントなしで1.5秒放置したら自動保存
          debounceRef.current = setTimeout(() => commitMemo(), 1500);
        }} />
      </header>

      <div className="timeline">
        {loading ? (
          <div className="loading-state">LOADING...</div>
        ) : sortedGroups.map(group => (
          <div key={group.key}>
            <DateDivider
              dateStr={group.dateStr}
              isToday={group.key === todayKey}
              onSummarize={() => setSummaryTarget({ dateStr: group.dateStr, memos: group.memos })}
            />
            {group.memos.map(memo => (
              <MemoCard
                key={memo.id}
                memo={memo}
                isNew={newIds.has(memo.id)}
                onUpdate={updateMemo}
                onDelete={deleteMemo}
                activePersona={activePersona}
                apiKey={apiKey}
                customIcons={customIcons}
                onIconChange={handleIconChange}
                onNeedApiKey={() => setShowSettings(true)}
              />
            ))}
          </div>
        ))}
      </div>

      {showSettings && (
        <SettingsModal
          apiKey={apiKey}
          onSave={saveApiKey}
          onClose={() => setShowSettings(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
