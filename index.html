<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  /* ===== DARK THEME (default) ===== */
  :root {
    --pink: #E91E8C;
    --magenta: #FF00FF;
    --cyan: #00FFFF;
    --bg: #07000F;
    --surface: #110028;
    --border: rgba(233,30,140,0.3);
    --text: #f0e6ff;
    --text-sub: rgba(240,230,255,0.55);
    --text-muted: rgba(240,230,255,0.2);
    --memo-bg: linear-gradient(135deg, rgba(17,0,40,0.9) 0%, rgba(13,0,32,0.9) 100%);
    --memo-border: rgba(233,30,140,0.15);
    --header-bg: linear-gradient(180deg, #07000F 0%, rgba(7,0,15,0.95) 100%);
    --grid-color: rgba(233,30,140,0.04);
    --glow-orb: rgba(233,30,140,0.12);
    --theme-transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
  }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] {
    --bg: #FEF6FA;
    --surface: #FFFFFF;
    --border: rgba(233,30,140,0.2);
    --text: #1A0010;
    --text-sub: rgba(26,0,16,0.5);
    --text-muted: rgba(26,0,16,0.28);
    --memo-bg: linear-gradient(135deg, #FFFFFF 0%, #FFF8FC 100%);
    --memo-border: rgba(233,30,140,0.1);
    --header-bg: linear-gradient(180deg, rgba(254,246,250,0.98) 0%, rgba(254,246,250,0.95) 100%);
    --grid-color: transparent;
    --glow-orb: rgba(233,30,140,0.05);
    --cyan: #007A9A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: var(--theme-transition);
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(233,30,140,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(233,30,140,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.35s ease;
  }

  [data-theme="light"] .grid-overlay { opacity: 0; }

  .glow-orb {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(233,30,140,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.35s ease;
  }

  [data-theme="light"] .glow-orb { opacity: 0; }

  #root { position: relative; z-index: 1; }

  /* ===== THEME TOGGLE BUTTON ===== */
  .theme-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .theme-btn:hover {
    border-color: var(--pink);
    box-shadow: 0 0 10px rgba(233,30,140,0.35);
    transform: rotate(20deg) scale(1.1);
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transition: var(--theme-transition);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--magenta), var(--pink), transparent);
    box-shadow: 0 0 12px var(--pink), 0 0 24px rgba(233,30,140,0.5);
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--pink);
    text-shadow: 0 0 10px var(--magenta), 0 0 20px rgba(255,0,255,0.4);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  .sync-status {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .sync-dot.synced { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .sync-dot.syncing { background: var(--pink); box-shadow: 0 0 6px var(--pink); animation: pulse-dot 0.8s ease-in-out infinite; }
  .sync-dot.offline { background: var(--text-muted); }

  /* ====== AUTH SCREEN ====== */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 0 40px rgba(233,30,140,0.15), inset 0 0 40px rgba(233,30,140,0.03);
    text-align: center;
  }

  .auth-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.4em;
    color: var(--pink);
    text-shadow: 0 0 20px var(--magenta);
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-sub);
    margin-bottom: 32px;
    font-family: 'Orbitron', monospace;
  }

  .auth-email-input {
    width: 100%;
    background: rgba(233,30,140,0.04);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 0.05em;
    padding: 12px 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--pink);
  }
  .auth-email-input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 12px rgba(233,30,140,0.3);
  }
  .auth-email-input::placeholder { color: var(--text-muted); }

  .auth-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    border: none;
    border-radius: 2px;
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(233,30,140,0.4);
  }

  .auth-btn:hover {
    box-shadow: 0 0 30px rgba(233,30,140,0.7), 0 0 60px rgba(255,0,255,0.3);
    transform: translateY(-1px);
  }

  .auth-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .auth-msg {
    margin-top: 16px;
    font-size: 12px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    letter-spacing: 0.05em;
    min-height: 20px;
  }

  /* ====== INPUT AREA ====== */
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 4px 16px 8px;
    max-width: 680px;
    margin: 0 auto;
  }

  .input-container {
    flex: 1;
    position: relative;
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 12px;
    padding: 8px 12px;
    transition: var(--theme-transition), border-color 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    min-width: 0;
  }

  .input-container.focused {
    border-color: rgba(233,30,140,0.4);
    box-shadow: 0 0 16px rgba(233,30,140,0.1);
  }

  .log-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 160px;
    overflow-y: auto;
    caret-color: var(--pink);
    transition: color 0.35s ease;
    padding: 0;
  }

  .log-input::placeholder { color: var(--text-muted); }

  .drop-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    background: var(--pink);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
  }
  .drop-btn:active { opacity: 0.75; transform: scale(0.95); }
  .drop-btn:disabled { opacity: 0.3; cursor: default; }

  /* ====== QUICK LOG ====== */
  .quick-log-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 16px 4px;
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 6px;
    scrollbar-width: none;
  }
  .quick-log-wrapper::-webkit-scrollbar { display: none; }

  .quick-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--memo-border);
    background: var(--memo-bg);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .quick-btn:hover, .quick-btn:active {
    border-color: var(--pink);
    background: rgba(233,30,140,0.1);
    box-shadow: 0 0 10px rgba(233,30,140,0.2);
    transform: scale(1.12);
  }
  .quick-btn--status {
    border-color: rgba(233,30,140,0.4);
    background: rgba(233,30,140,0.08);
  }
  .quick-btn--diary {
    border-color: rgba(233,30,140,0.6);
    background: rgba(233,30,140,0.12);
    box-shadow: 0 0 8px rgba(233,30,140,0.15);
  }
  .quick-btn--diary-tag {
    opacity: 0.85;
    border-style: dashed;
  }
  .quick-btn--active {
    border-color: var(--pink);
    background: rgba(233,30,140,0.15);
    box-shadow: 0 0 8px rgba(233,30,140,0.3);
  }
  /* 日記モーダル */
  .diary-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .diary-modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 680px;
    padding: 20px 20px 32px;
    max-height: 88vh; overflow-y: auto;
  }
  .diary-modal-header {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 16px;
  }
  .diary-modal-header span {
    font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 0.2em;
    color: #E91E8C; font-weight: 700;
  }
  .diary-modal-header div {
    font-family: var(--font-heading); font-size: 14px; letter-spacing: 0.1em;
    color: var(--pink);
  }
  .diary-section {
    margin-bottom: 14px;
  }
  .diary-section-label {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .diary-section-input {
    width: 100%; background: var(--memo-bg);
    border: 1px solid var(--memo-border); border-radius: 4px;
    color: var(--text); font-size: 14px; line-height: 1.6;
    padding: 8px 10px; resize: none; min-height: 60px;
    font-family: inherit;
  }
  .diary-section-input:focus { outline: none; border-color: var(--pink); }
  .diary-modal-footer {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
  }

  /* ====== TIMELINE ====== */
  .timeline {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 24px 0;
  }

  /* ====== BOTTOM INPUT BAR ====== */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 100;
    background: var(--header-bg);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-bar::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--magenta), var(--pink), transparent);
    box-shadow: 0 0 12px var(--pink), 0 0 24px rgba(233,30,140,0.5);
  }
  /* タイムラインがボトムバーに隠れないよう余白 */
  .timeline-spacer {
    height: 100px;
  }

  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0 8px;
  }

  .date-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #E91E8C;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .date-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .date-badge {
    font-family: 'Orbitron', monospace;
    font-size: 7px;
    letter-spacing: 0.25em;
    color: var(--pink);
    text-shadow: 0 0 8px var(--pink);
    border: 1px solid rgba(233,30,140,0.3);
    padding: 2px 6px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  /* ====== TAG BADGE ====== */
  .tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 9px;
    border-radius: 12px;
    background: rgba(233,30,140,0.12);
    border: 1px solid rgba(233,30,140,0.25);
    font-size: 13px;
    font-weight: 600;
    color: var(--pink);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  /* ====== MEMO CARD ====== */
  .memo-card-wrap {
    position: relative;
    margin-bottom: 6px;
    overflow: hidden;
    border-radius: 2px;
  }
  .memo-card-delete-bg {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 80px;
    background: #c0152a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .memo-card {
    background: var(--memo-bg);
    border: 1px solid var(--memo-border);
    border-radius: 2px;
    padding: 12px 16px 10px;
    transition: var(--theme-transition), border-color 0.2s, box-shadow 0.2s, transform 0.15s ease;
    cursor: text;
    position: relative;
    z-index: 1;
    will-change: transform;
    width: 100%;
    box-sizing: border-box;
  }

  .memo-card:hover {
    border-color: rgba(233,30,140,0.25);
    box-shadow: 0 0 12px rgba(233,30,140,0.06);
  }

  /* ── Edit Focus Overlay ── */
  .edit-focus-overlay {

/* iOS PWA用: SafariとPWAでセッションを共有するためCookieストレージを使う */
const cookieStorage = {
  getItem(key) {
    const m = document.cookie.match('(?:^|; )' + key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
  },

];

];

/* ── Helpers ── */
/* ── DiaryModal ── */
function parseDiaryText(text) {
  if (!text) return { main: '', get: '', people: '', health: '' };
  const blocks = text.split('\n\n');
  let main = '', get = '', people = '', health = '';
  for (const block of blocks) {
    if (block.startsWith('🛍️ GET\n')) get = block.slice('🛍️ GET\n'.length);
    else if (block.startsWith('🤝 人との関わり\n')) people = block.slice('🤝 人との関わり\n'.length);
    else if (block.startsWith('🌡️ 体調\n')) health = block.slice('🌡️ 体調\n'.length);
    else main = block;
  }
  return { main, get, people, health };
}

function DiaryModal({ onClose, onPost, onUpdate, existing, dateStr }) {
  const parsed = parseDiaryText(existing?.text);
  const [main, setMain] = React.useState(parsed.main);
  const [get, setGet] = React.useState(parsed.get);
  const [people, setPeople] = React.useState(parsed.people);
  const [health, setHealth] = React.useState(parsed.health);
  const isEdit = !!existing;

  const buildText = () => {
    const parts = [];
    if (main.trim()) parts.push(main.trim());
    if (get.trim()) parts.push(`🛍️ GET\n${get.trim()}`);
    if (people.trim()) parts.push(`🤝 人との関わり\n${people.trim()}`);
    if (health.trim()) parts.push(`🌡️ 体調\n${health.trim()}`);
    return parts.join('\n\n');
  };

  const handleSave = () => {
    const text = buildText();
    if (!text) return;
    if (isEdit) onUpdate(existing.id, text, '📕 日記');
    else onPost(text, '📕 日記');
    onClose();
  };

  return (
    <div className="diary-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="diary-modal">
        <div className="diary-modal-header">
          <span style={{fontSize:'11px',color:'var(--text-muted)',fontFamily:'Rajdhani,sans-serif',letterSpacing:'0.1em'}}>{dateStr}</span>
          <div>📕 {isEdit ? '日記を編集' : '日記を書く'}</div>
        </div>
        <div className="diary-section">
          <div className="diary-section-label">TODAY</div>
          <textarea className="diary-section-input" placeholder="今日あったこと、感じたこと…" value={main} onChange={e => setMain(e.target.value)} rows={4} />
        </div>
        <div className="diary-section">
          <div className="diary-section-label">🛍️ GET</div>
          <textarea className="diary-section-input" placeholder="手に入れたもの、買ったもの…" value={get} onChange={e => setGet(e.target.value)} rows={2} />
        </div>
        <div className="diary-section">
          <div className="diary-section-label">🤝 人との関わり</div>
          <textarea className="diary-section-input" placeholder="会った人、話した人…" value={people} onChange={e => setPeople(e.target.value)} rows={2} />
        </div>
        <div className="diary-section">
          <div className="diary-section-label">🌡️ 体調</div>
          <textarea className="diary-section-input" placeholder="体の調子、気分…" value={health} onChange={e => setHealth(e.target.value)} rows={2} />
        </div>
        <div className="diary-modal-footer">
          <button className="edit-cancel-btn" onClick={onClose}>CANCEL</button>
          <button className="edit-save-btn" onClick={handleSave}>{isEdit ? 'SAVE' : 'POST'}</button>
        </div>
      </div>
    </div>
  );
}

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${DAYS[d.getDay()]}`;
}
function formatTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function dateKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function nowFormatted() {
  const d = new Date();
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${DAYS[d.getDay()]}`;
}

/* ── Quick Log Bar ── */
function QuickLogBar({ onSelect, onOpenDiary, externalStatuses }) {
  const [statuses, setStatuses] = React.useState(() =>
    Object.fromEntries(STATUS_PAIRS.map(p => [p.key, localStorage.getItem(p.key) || p.defaultVal]))
  );

  // memos変化（削除など）があったら外部ステータスで同期
  React.useEffect(() => {
    if (!externalStatuses) return;
    setStatuses(externalStatuses);
    Object.entries(externalStatuses).forEach(([k, v]) => localStorage.setItem(k, v));
  }, [externalStatuses]);

  const handleStatus = (pair, picked) => {
    const next = picked;
    localStorage.setItem(pair.key, next);
    setStatuses(prev => ({ ...prev, [pair.key]: next }));
    const tag = picked === 'a' ? pair.a : pair.b;
    onSelect(tag.emoji + ' ' + tag.label, {});
  };

  return (
    <div className="quick-log-wrapper">
      {STATUS_PAIRS.map(pair => {
        const cur = statuses[pair.key];
        const show = cur === 'a' ? pair.b : pair.a;
        const picked = cur === 'a' ? 'b' : 'a';
        return (
          <button key={pair.key} className="quick-btn quick-btn--status" onClick={() => handleStatus(pair, picked)} title={show.label}>
            {show.emoji}
          </button>
        );
      })}
      {ALWAYS_TAGS.map(({ emoji, label, todo }) => (
        <button key={label} className="quick-btn" onClick={() => onSelect(emoji + ' ' + label, { todo })} title={label}>
          {emoji}
        </button>
      ))}
      <button className="quick-btn quick-btn--diary" onClick={onOpenDiary} title="日記">📕</button>
    </div>
  );
}

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    isHorizSwipe.current = false;
  };

  const handleTouchMove = (e) => {
    if (editing) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (!isHorizSwipe.current && Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) {
      isHorizSwipe.current = true;
      e.preventDefault();
      setSwipeX(Math.max(dx, -90));
    }
  };

  const handleTouchEnd = () => {
    if (swipeX < -60) {
      setSwipeX(-80);
      setShowDeleteConfirm(true);
    } else {
      setSwipeX(0);
    }
  };

  const handleDeleteConfirm = async () => {
    setShowDeleteConfirm(false);
    setSwipeX(0);
    await onDelete(memo.id);
  };

  const handleDeleteCancel = () => {
    setShowDeleteConfirm(false);
    setSwipeX(0);
  };

  useEffect(() => {
    if (editing && taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = taRef.current.scrollHeight + 'px';
      taRef.current.focus();
      const len = taRef.current.value.length;
      taRef.current.setSelectionRange(len, len);
    }
  }, [editing]);

  const startEditing = () => { setEditing(true); onEditStart && onEditStart(memo.id); };
  const stopEditing = () => { setEditing(false); onEditEnd && onEditEnd(); };

  const handleSave = async () => {
    await onUpdate(memo.id, editText.trim(), editTag);
    stopEditing();
  };

  const handleCancel = () => {
    setEditText(memo.text);
    setEditTag(memo.tag);
    setShowTagPicker(false);
    stopEditing();
  };

  const handleKeyDown = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); handleSave(); }
    if (e.key === 'Escape') handleCancel();
  };

  const handleInput = (e) => {
    setEditText(e.target.value);
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
  };

  return (
    <div className={`memo-card-wrap${editing ? ' is-editing' : ''}`}>
      {swipeX < 0 && <div className="memo-card-delete-bg" style={{opacity: Math.min(1, Math.abs(swipeX)/60)}}>DELETE</div>}
      {showDeleteConfirm && <DeleteConfirm onCancel={handleDeleteCancel} onConfirm={handleDeleteConfirm} memo={memo} />}
    <div
      className={`memo-card ${isNew ? 'new-entry' : ''} ${editing ? 'editing' : ''}`}
      onClick={() => { if (!editing) startEditing(); }}
      style={{ cursor: editing ? 'default' : 'text', transform: `translateX(${swipeX}px)`, transition: swipeX === 0 ? 'transform 0.2s ease' : 'none' }}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      <div className="memo-time">{formatTime(memo.created_at)}</div>
      {!editing && memo.tag && <div className="tag-badge">{memo.tag}</div>}
      {editing ? (
        <>
          <div className="tag-edit-row" onClick={e => e.stopPropagation()}>
            {editTag ? (
              <span className="tag-badge" style={{cursor:'pointer'}} onClick={() => setShowTagPicker(v => !v)}>
                {editTag} ✎
              </span>
            ) : (
              <button
                className="tag-add-btn"
                onClick={() => setShowTagPicker(v => !v)}
              >＋ タグ</button>
            )}
          </div>
          {showTagPicker && (
            <div className="tag-edit-picker" onClick={e => e.stopPropagation()}>
              {editTag && (
                <button
                  className="quick-btn"
                  style={{width:'34px',height:'34px',fontSize:'13px',color:'var(--text-muted)'}}
                  onClick={() => { setEditTag(null); setShowTagPicker(false); }}
                  title="タグ削除"
                >×</button>
              )}
              {QUICK_TAGS.map(({emoji, label}) => {
                const val = emoji + ' ' + label;
                return (
                  <button
                    key={label}
                    className={`quick-btn${editTag === val ? ' tag-selected' : ''}`}
                    style={{width:'34px',height:'34px',fontSize:'17px'}}
                    onClick={() => { setEditTag(val); setShowTagPicker(false); }}
                  >{emoji}</button>
                );
              })}
            </div>
          )}
          <textarea
            ref={taRef}
            className="memo-edit-input"
            value={editText}
            onChange={handleInput}
            onKeyDown={handleKeyDown}
            onClick={e => e.stopPropagation()}
            placeholder="コメントを追加…"
          />
          <div className="memo-edit-footer" onClick={e => e.stopPropagation()}>
            <span className="edit-hint">⌘ + ENTER to save  •  ESC to cancel</span>
            <button className="edit-cancel-btn" onClick={handleCancel}>CANCEL</button>
            <button className="edit-save-btn" onClick={handleSave}>SAVE</button>
          </div>
        </>
      ) : (
        <>
          {memo.text
            ? <div className="memo-text">{memo.text}</div>
            : memo.tag && <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'4px'}}>タップしてコメントを追加…</div>
          }
        </>
      )}
    </div>
    </div>
  );
}

/* ── DailySummary ── */
function DailySummary({ dateStr, memos, onClose, onPrev, onNext, isToday }) {
  const cacheKey = `il-summary-v2-${dateStr}`;
  const cached = !isToday && localStorage.getItem(cacheKey);
  const [result, setResult] = useState(cached ? JSON.parse(cached) : null);
  const [loading, setLoading] = useState(!cached);

  useEffect(() => {
    if (!cached) generate();
    else {
      setResult(JSON.parse(localStorage.getItem(cacheKey)));
      setLoading(false);
    }
  }, [dateStr]);

  const generate = async () => {
    setLoading(true);
    setResult(null);

    const tagCounts = {};
    memos.forEach(m => {
      if (m.tag) tagCounts[m.tag] = (tagCounts[m.tag] || 0) + 1;
    });
    const tagSummary = Object.entries(tagCounts).map(([t, c]) => `${t} ×${c}`).join('、');
    const logs = memos.map((m, i) => {
      const parts = [];
      if (m.tag) parts.push(`[${m.tag}]`);
      if (m.text) parts.push(m.text);
      return `${i+1}. ${parts.join(' ') || '（記録のみ）'}`;
    }).join('\n');

    if (DEMO_MODE) {
      setResult({ tagCounts, lines: ['今日もたくさん記録してくれたね！', 'アイデアや気づきがあふれてた1日。', '自分と向き合う時間、すてきだよ。'], message: '今日もしっかり生きてた。' });
      setLoading(false);
      return;
    }

    const system = `以下の今日のログ全件（タグあり・タグなし問わずすべて）をもとに、JSON形式のみで返してください（他のテキスト不要）:
{"lines":["振り返り1","振り返り2","振り返り3"],"message":"一言コメント（1〜2文）"}
【重要】・linesはログに書かれた具体的な言葉・出来事を必ず使うこと。タグなしの投稿内容も必ず含めること。抽象的な表現NG。ですます調。`;

    const userText = `タグ集計: ${tagSummary || 'なし'}\n\n今日のログ全件:\n${logs || '（記録なし）'}`;

    try {
      const res = await fetch(`${SB_URL}/functions/v1/ai-reply`, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'authorization': `Bearer ${SB_KEY}` },
        body: JSON.stringify({ text: userText, system }),
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const json = JSON.parse(text.match(/\{[\s\S]*\}/)?.[0] || '{}');
      const newResult = { tagCounts, lines: json.lines || [], message: json.message || '' };
      setResult(newResult);
      if (!isToday) localStorage.setItem(cacheKey, JSON.stringify(newResult));
    } catch (e) {
      setResult({ error: true });
    }
    setLoading(false);
  };

  return (
    <div className="summary-overlay" onClick={onClose}>
      <div className="summary-sheet" onClick={e => e.stopPropagation()}>
        <div className="summary-nav">
          <button className="summary-nav-btn" onClick={onPrev} disabled={!onPrev}>‹ 前の日</button>
          <div className="summary-date">✦ {dateStr}</div>
          <button className="summary-nav-btn" onClick={onNext} disabled={!onNext}>次の日 ›</button>
        </div>
        {loading ? (
          <div className="summary-loading">まとめ中…</div>
        ) : result?.error ? (
          <div className="summary-loading">生成できませんでした</div>
        ) : (
          <>
            <div className="summary-section-title">TODAY'S TAGS</div>
            <div className="summary-tags">
              {Object.entries(result.tagCounts).length > 0
                ? Object.entries(result.tagCounts).map(([tag, count]) => (
                    <span key={tag} className="summary-tag-chip">{tag} ×{count}</span>
                  ))
                : <span style={{fontSize:'13px',color:'var(--text-muted)'}}>タグなし</span>
              }
            </div>
            <div className="summary-section-title">TODAY IN 3 LINES</div>
            <div className="summary-lines">
              {result.lines.map((l, i) => <div key={i} className="summary-line">{l}</div>)}
            </div>
            <div className="summary-section-title">✦ TODAY'S NOTE</div>
            <div className="summary-char-msg">{result.message}</div>
            <button className="summary-btn" style={{margin:'16px auto 0',display:'block'}} onClick={generate}>再生成</button>
          </>
        )}
        <button className="summary-close" onClick={onClose}>閉じる</button>
      </div>
    </div>
  );
}

function AuthScreen() {
  const [email, setEmail] = useState('');

  const [msg, setMsg] = useState('');

  const sendMagicLink = async () => {
    if (!email.trim()) return;
    setSending(true);
    setMsg('');

    const { error } = await sb.auth.signInWithOtp({
      email: email.trim(),

    });

      setMsg('エラー: ' + error.message);
    } else {
      setMsg('メールを送りました。リンクをクリックしてログイン ✓');

    setSending(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') sendMagicLink();
  };

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">INFINITY LOG</div>
        <div className="auth-sub">PERSONAL TIMELINE</div>

          type="email"

          value={email}

/* ── App ── */
function App() {
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [memos, setMemos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [draft, setDraft] = useState('');
  const [focused, setFocused] = useState(false);
  const [savedVisible, setSavedVisible] = useState(false);
  const [syncStatus, setSyncStatus] = useState('offline');
  const [newIds, setNewIds] = useState(new Set());
  const [theme, setTheme] = useState(() => localStorage.getItem('il-theme') || 'dark');
  const [pendingTag, setPendingTag] = useState(null);
  const pendingTagRef = useRef(null);
  const pendingTodoRef = useRef(false);
  const [summaryTarget, setSummaryTarget] = useState(null); // {dateStr, memos}
  const [editingCardId, setEditingCardId] = useState(null);
  const [showDiary, setShowDiary] = useState(null); // { dateKey, dateStr } | null
  const [showIdeaBook, setShowIdeaBook] = useState(false);
  const [sessionKey, setSessionKey] = useState(
    () => localStorage.getItem('il-session-key') || dateKey(Date.now())
  );
  const sessionKeyRef = useRef(sessionKey);

  const headerRef = useRef(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('il-theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  useEffect(() => { sessionKeyRef.current = sessionKey; }, [sessionKey]);

  const handleNewPage = () => {
    const key = dateKey(Date.now());
    localStorage.setItem('il-session-key', key);
    setSessionKey(key);
    sessionKeyRef.current = key;
  };

  // セッション日付のtimestampを生成（sessionKey = "YYYY-M0based-D"）
  const getSessionTs = () => {
    const parts = sessionKeyRef.current.split('-').map(Number);
    const now = new Date();
    return new Date(parts[0], parts[1], parts[2], now.getHours(), now.getMinutes(), now.getSeconds(), now.getMilliseconds()).toISOString();
  };

  const textareaRef = useRef(null);
  const debounceRef = useRef(null);
  const savedTimerRef = useRef(null);

  useEffect(() => {
    if (DEMO_MODE) {
      setSession({ user: { id: 'demo', email: 'demo@localhost' } });
      setAuthChecked(true);
      return;
    }
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthChecked(true);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setSession(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  /* Fetch memos */
  useEffect(() => {
    if (!session) return;
    if (DEMO_MODE) {
      setMemos(DEMO_MEMOS);
      setLoading(false);
      setSyncStatus('synced');
      return;
    }
    setLoading(true);
    sb.from('diary_logs')
      .select('*')
      .eq('user_id', session.user.id)
      .order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setMemos(data);
        setLoading(false);
        setSyncStatus('synced');
      });

    if (DEMO_MODE) return;
    const filter = `user_id=eq.${session.user.id}`;
    const channel = sb.channel('diary_realtime')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.find(m => m.id === payload.new.id) ? prev : [payload.new, ...prev]);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'diary_logs', filter }, payload => {
        setMemos(prev => prev.filter(m => m.id !== payload.old.id));
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [session]);


  const commitMemo = useCallback(async () => {
    const text = draft.trim();
    const tag = pendingTagRef.current;
    const isTodo = pendingTodoRef.current;
    if (!text && !tag) return;
    setDraft('');
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    pendingTagRef.current = null;
    pendingTodoRef.current = false;
    setPendingTag(null);
    setSyncStatus('syncing');

    const sessionTs = getSessionTs();
    if (DEMO_MODE) {
      const fake = { id: String(Date.now()), text: text || null, tag: tag || null, created_at: sessionTs, user_id: 'demo' };
      setMemos(prev => [fake, ...prev]);
      setNewIds(prev => new Set([...prev, fake.id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(fake.id); return n; }), 500);
      setSyncStatus('synced');
      setSavedVisible(true);
      clearTimeout(savedTimerRef.current);
      savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
      return;
    }

    const { data, error } = await sb.from('diary_logs').insert({ text: text || null, tag: tag || null, user_id: session.user.id, created_at: sessionTs }).select().single();
    if (!error && data) {
      setMemos(prev => {
        if (prev.find(m => m.id === data.id)) return prev;
        return [data, ...prev];
      });
      setNewIds(prev => new Set([...prev, data.id]));
      setTimeout(() => {
        setNewIds(prev => { const n = new Set(prev); n.delete(data.id); return n; });
      }, 500);
    }
    setSyncStatus('synced');
    setSavedVisible(true);
    clearTimeout(savedTimerRef.current);
    savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
  }, [draft]);

  const postTagOnly = useCallback(async (tag) => {
    if (!tag) return;
    setSyncStatus('syncing');
    const sessionTs = getSessionTs();
    if (DEMO_MODE) {
      const fake = { id: String(Date.now()), text: null, tag, created_at: sessionTs, user_id: 'demo' };
      setMemos(prev => [fake, ...prev]);
      setNewIds(prev => new Set([...prev, fake.id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(fake.id); return n; }), 500);
      setSyncStatus('synced');
      setSavedVisible(true);
      clearTimeout(savedTimerRef.current);
      savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
      return;
    }
    const { data, error } = await sb.from('diary_logs').insert({ text: null, tag, user_id: session.user.id, created_at: sessionTs }).select().single();
    if (!error && data) {
      setMemos(prev => prev.find(m => m.id === data.id) ? prev : [data, ...prev]);
      setNewIds(prev => new Set([...prev, data.id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(data.id); return n; }), 500);
    }
    setSyncStatus('synced');
    setSavedVisible(true);
    clearTimeout(savedTimerRef.current);
    savedTimerRef.current = setTimeout(() => setSavedVisible(false), 2000);
  }, [session]);

  const handleKeyDown = (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      commitMemo();
    }
  };

    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  };

  const updateMemo = useCallback(async (id, text, tag) => {

      setMemos(prev => prev.map(m => m.id === id ? { ...m, text: text || null, tag: tag || null } : m));
      return;
    }
    setSyncStatus('syncing');
    const { data, error } = await sb.from('diary_logs').update({ text: text || null, tag: tag || null }).eq('id', id).select().single();
    if (!error && data) {
      setMemos(prev => prev.map(m => m.id === id ? data : m));
    }
    setSyncStatus('synced');
  }, []);

  const deleteMemo = useCallback(async (id) => {
    if (DEMO_MODE) {
      setMemos(prev => prev.filter(m => m.id !== id));
      return;
    }
    setSyncStatus('syncing');
    const { error } = await sb.from('diary_logs').delete().eq('id', id).eq('user_id', session.user.id);
    if (error) {
      console.error('delete error:', error);
      setSyncStatus('synced');
      return;

    setMemos(prev => prev.filter(m => m.id !== id));
    setSyncStatus('synced');

  const handleChange = (e) => {

  /* Group by date */

  const statusFromMemos = React.useMemo(() => {
    const result = {};
    for (const pair of STATUS_PAIRS) {
      const aTag = pair.a.emoji + ' ' + pair.a.label;
      const bTag = pair.b.emoji + ' ' + pair.b.label;
      const latest = memos.find(m => m.tag === aTag || m.tag === bTag);
      result[pair.key] = latest
        ? (latest.tag === aTag ? 'a' : 'b')
        : (localStorage.getItem(pair.key) || pair.defaultVal);
    }
    return result;

  if (!session) return <AuthScreen />;

  const diaryPostFn = async (text, tag) => {
    setSyncStatus('syncing');
    const { data, error } = await sb.from('diary_logs').insert({ text, tag, user_id: session.user.id, created_at: getSessionTs() }).select().single();
    if (!error && data) {
      setMemos(prev => prev.find(m => m.id === data.id) ? prev : [data, ...prev]);
      setNewIds(prev => new Set([...prev, data.id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(data.id); return n; }), 500);
    }
    setSyncStatus('synced');
  };

  // 日記上書き保存：created_atをセッション日付の最新時刻に更新してトップへ
  const diaryUpdateFn = async (id, text, tag) => {
    setSyncStatus('syncing');
    const now = getSessionTs();
    const { data, error } = await sb.from('diary_logs')
      .update({ text: text || null, tag: tag || null, created_at: now })
      .eq('id', id).select().single();
    if (!error && data) {
      setMemos(prev => [data, ...prev.filter(m => m.id !== id)]);
      setNewIds(prev => new Set([...prev, id]));
      setTimeout(() => setNewIds(prev => { const n = new Set(prev); n.delete(id); return n; }), 500);
    }
    setSyncStatus('synced');
  };

  return (
    <>
      {editingCardId && <div className="edit-focus-overlay" />}
      {showIdeaBook && <IdeaBook memos={memos} onClose={() => setShowIdeaBook(false)} />}
      {showDiary && <DiaryModal
        onClose={() => setShowDiary(null)}
        onPost={diaryPostFn}
        onUpdate={diaryUpdateFn}
        dateStr={showDiary.dateStr}
        existing={memos.find(m => m.tag === '📕 日記' && dateKey(m.created_at) === showDiary.dateKey) || null}
      />}
      {summaryTarget && (() => {
        const idx = sortedGroups.findIndex(g => g.dateStr === summaryTarget.dateStr);
        const prevGroup = idx < sortedGroups.length - 1 ? sortedGroups[idx + 1] : null;
        const nextGroup = idx > 0 ? sortedGroups[idx - 1] : null;
        return (
          <DailySummary
            dateStr={summaryTarget.dateStr}
            memos={summaryTarget.memos}
            isToday={sortedGroups[idx]?.key === sessionKey}
            onClose={() => setSummaryTarget(null)}
            onPrev={prevGroup ? () => setSummaryTarget({ dateStr: prevGroup.dateStr, memos: prevGroup.memos }) : null}
            onNext={nextGroup ? () => setSummaryTarget({ dateStr: nextGroup.dateStr, memos: nextGroup.memos }) : null}
          />
        );
      })()}
      <header className="header" ref={headerRef}>
        <div className="header-inner">
          <div className="logo">
            <span className="logo-dot" />
            <span className="logo-text">INFINITY LOG</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', position: 'relative' }}>
            <div className="sync-status" style={{ color: syncColor[syncStatus] }}>
              <span className={`sync-dot ${syncStatus}`} />
              {syncLabel[syncStatus]}
            </div>
            <button className="theme-btn" onClick={() => setShowIdeaBook(true)} title="アイデア帳">💡</button>
            {sessionKey !== realTodayKey && (
              <button className="theme-btn" onClick={handleNewPage} title="今日のページを開く" style={{ fontSize: '11px', padding: '4px 8px' }}>
                今日 →
              </button>
            )}
            <button className="theme-btn" onClick={toggleTheme} title="テーマ切り替え">
              {theme === 'dark' ? '☀️' : '🌙'}
            </button>
          </div>
        </div>
      </header>

      <div className="bottom-bar">
        <QuickLogBar
          externalStatuses={statusFromMemos}
          onOpenDiary={() => setShowDiary({ dateKey: sessionKey, dateStr: sessionDateStr })}
          onSelect={(tag, opts) => {
            pendingTagRef.current = tag;
            pendingTodoRef.current = !!(opts && opts.todo);
            setPendingTag(tag);
            textareaRef.current?.focus();
          }}
        />
        <div className="input-row">
          <div className={`input-container ${focused ? 'focused' : ''}`}>
            {pendingTag && (
              <span
                className="tag-badge"
                style={{marginBottom:0, cursor:'pointer', flexShrink:0}}
                onClick={() => { pendingTagRef.current = null; setPendingTag(null); }}
                title="タップで削除"
              >{pendingTag} ×</span>
            )}
            <textarea
              ref={textareaRef}
              className="log-input"
              rows={1}
              placeholder="今、ここに残す…"
              value={draft}
              onChange={handleChange}
              onInput={handleAutoResize}
              onKeyDown={handleKeyDown}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
            />
          </div>
          <button
            className="drop-btn"
            onClick={commitMemo}
            disabled={!draft.trim() && !pendingTag}
          >↑</button>
        </div>
      </div>

      <div className="timeline">
        {loading ? (
          <div className="loading-state">LOADING...</div>
        ) : sortedGroups.map(group => {
          const ascMemos = [...group.memos].sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
          return (
            <div key={group.key}>
              <DateDivider
                dateStr={group.dateStr}
                isToday={group.key === sessionKey}
                onSummarize={() => setSummaryTarget({ dateStr: group.dateStr, memos: group.memos })}
                onOpenDiary={() => setShowDiary({ dateKey: group.key, dateStr: group.dateStr })}
              />
              {ascMemos.map(memo => (
                <MemoCard
                  key={memo.id}
                  memo={memo}
                  isNew={newIds.has(memo.id)}
                  onUpdate={updateMemo}
                  onDelete={deleteMemo}
                  onEditStart={(id) => setEditingCardId(id)}
                  onEditEnd={() => setEditingCardId(null)}
                />
              ))}
            </div>
          );
        })}
        <div className="timeline-spacer" />
      </div>

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
